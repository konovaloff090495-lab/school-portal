name: Add School Cards

on:
  schedule:
    # Каждый день в 08:00 МСК (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: 'Город вручную (пусто = из очереди)'
        required: false
      slug:
        description: 'Slug города'
        required: false
      types:
        description: 'Типы через запятую (пусто = из очереди)'
        required: false
      count:
        description: 'Школ на тип'
        default: '8'
        required: false

jobs:
  add-schools:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pick next from queue
        id: pick
        env:
          MANUAL_CITY: ${{ github.event.inputs.city }}
          MANUAL_SLUG: ${{ github.event.inputs.slug }}
          MANUAL_TYPES: ${{ github.event.inputs.types }}
        run: |
          if [ -n "$MANUAL_CITY" ] && [ -n "$MANUAL_SLUG" ]; then
            echo "city=$MANUAL_CITY"   >> $GITHUB_OUTPUT
            echo "slug=$MANUAL_SLUG"   >> $GITHUB_OUTPUT
            echo "types=$MANUAL_TYPES" >> $GITHUB_OUTPUT
            echo "skip=false"          >> $GITHUB_OUTPUT
          else
            node -e "
              const fs = require('fs');
              const queue = JSON.parse(fs.readFileSync('scripts/school-cards-queue.json', 'utf-8'));
              const next = queue.find(e => e.status === 'pending');
              if (!next) {
                console.log('skip=true');
                process.exit(0);
              }
              next.status = 'running';
              fs.writeFileSync('scripts/school-cards-queue.json', JSON.stringify(queue, null, 2));
              console.log('city=' + next.city);
              console.log('slug=' + next.slug);
              console.log('types=' + next.types);
              console.log('skip=false');
            " >> $GITHUB_OUTPUT
          fi

      - name: Generate school cards
        if: steps.pick.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CITY: ${{ steps.pick.outputs.city }}
          SLUG: ${{ steps.pick.outputs.slug }}
          TYPES: ${{ steps.pick.outputs.types }}
          COUNT: ${{ github.event.inputs.count || '8' }}
        run: |
          ARGS="--city=\"$CITY\" --slug=\"$SLUG\" --count=$COUNT --no-deploy --no-photos"
          if [ -n "$TYPES" ]; then
            ARGS="$ARGS --types=\"$TYPES\""
          fi
          eval node scripts/generate-city.mjs $ARGS

      - name: Mark done in queue
        if: steps.pick.outputs.skip != 'true' && success()
        run: |
          node -e "
            const fs = require('fs');
            const queue = JSON.parse(fs.readFileSync('scripts/school-cards-queue.json', 'utf-8'));
            const running = queue.find(e => e.status === 'running');
            if (running) running.status = 'done';
            fs.writeFileSync('scripts/school-cards-queue.json', JSON.stringify(queue, null, 2));
          "

      - name: Revert queue status on failure
        if: steps.pick.outputs.skip != 'true' && failure()
        run: |
          node -e "
            const fs = require('fs');
            const queue = JSON.parse(fs.readFileSync('scripts/school-cards-queue.json', 'utf-8'));
            const running = queue.find(e => e.status === 'running');
            if (running) running.status = 'pending';
            fs.writeFileSync('scripts/school-cards-queue.json', JSON.stringify(queue, null, 2));
          "

      - name: Configure git
        run: |
          git config user.name "pro-schools bot"
          git config user.email "bot@pro-schools.ru"

      - name: Commit and push
        if: steps.pick.outputs.skip != 'true'
        run: |
          git add src/data/schools.ts scripts/school-cards-queue.json
          git diff --staged --quiet || git commit -m "Schools: add ${{ steps.pick.outputs.types }} for ${{ steps.pick.outputs.city }} $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        if: steps.pick.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          COMMIT=$(git rev-parse HEAD)
          curl -sf -X POST "https://api.vercel.com/v13/deployments?teamId=team_nn4HHJh7sr6tITE0mA24TmBT" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"school-portal\",
              \"project\": \"prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"konovaloff090495-lab\",
                \"repo\": \"school-portal\",
                \"ref\": \"main\",
                \"sha\": \"$COMMIT\"
              }
            }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('url'), '— state:', d.get('readyState'))"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          CITY: ${{ steps.pick.outputs.city }}
          SLUG: ${{ steps.pick.outputs.slug }}
          TYPES: ${{ steps.pick.outputs.types }}
          COUNT: ${{ github.event.inputs.count || '8' }}
          SKIP: ${{ steps.pick.outputs.skip }}
        run: |
          if [ "$SKIP" = "true" ]; then
            MSG=$(printf '✅ *Очередь карточек пуста*\nВсе комбинации городов и типов обработаны!')
          elif [ "$JOB_STATUS" = "success" ]; then
            PENDING=$(node -e "
              const fs = require('fs');
              const q = JSON.parse(fs.readFileSync('scripts/school-cards-queue.json'));
              console.log(q.filter(e => e.status === 'pending').length);
            " 2>/dev/null || echo "?")
            MSG=$(printf '🏫 *Новые карточки школ*\n\n📍 %s\n📚 Типы: %s\n➕ ~%s школ на тип\n🔗 https://pro-schools.ru/shkoly/%s/\n\n📋 В очереди: %s записей\n📅 %s МСК' \
              "$CITY" "$TYPES" "$COUNT" "$SLUG" "$PENDING" "$(date +'%d.%m.%Y %H:%M')")
          else
            MSG=$(printf '❌ *Ошибка добавления карточек*\nГород: %s | Типы: %s\nПроверь: https://github.com/konovaloff090495-lab/school-portal/actions' \
              "$CITY" "$TYPES")
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d "text=${MSG}" > /dev/null
