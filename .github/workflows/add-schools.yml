name: Add School Cards

on:
  schedule:
    # Каждый понедельник в 07:00 МСК (04:00 UTC) — добавляем карточки для нового типа/города
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      city:
        description: 'Название города (напр. Казань)'
        required: true
      slug:
        description: 'Slug города (напр. kazan)'
        required: true
      types:
        description: 'Типы через запятую (пусто = все)'
        required: false
      count:
        description: 'Школ на тип'
        default: '8'
        required: false

jobs:
  add-schools:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate school cards
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_PROJECT_ID: prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ
          VERCEL_ORG_ID: team_nn4HHJh7sr6tITE0mA24TmBT
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          CITY="${{ github.event.inputs.city }}"
          SLUG="${{ github.event.inputs.slug }}"
          COUNT="${{ github.event.inputs.count || '8' }}"
          TYPES="${{ github.event.inputs.types }}"

          ARGS="--city=\"$CITY\" --slug=\"$SLUG\" --count=$COUNT --no-deploy --no-photos"
          if [ -n "$TYPES" ]; then
            ARGS="$ARGS --types=\"$TYPES\""
          fi

          eval node scripts/generate-city.mjs $ARGS

      - name: Configure git
        run: |
          git config user.name "pro-schools bot"
          git config user.email "bot@pro-schools.ru"

      - name: Commit and push
        run: |
          git add src/data/schools.ts
          git diff --staged --quiet || git commit -m "Schools: add cards for ${{ github.event.inputs.city || 'city' }} $(date +'%Y-%m-%d')"
          git push

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_PROJECT_ID: prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ
          VERCEL_ORG_ID: team_nn4HHJh7sr6tITE0mA24TmBT
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --yes --token $VERCEL_TOKEN

      - name: Notify Telegram
        if: always()
        run: |
          CITY="${{ github.event.inputs.city }}"
          SLUG="${{ github.event.inputs.slug }}"
          TYPES="${{ github.event.inputs.types || 'все типы' }}"
          COUNT="${{ github.event.inputs.count || '8' }}"

          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="🏫 *Новые карточки школ на pro-schools.ru*

📍 Город: *$CITY*
📚 Типы: $TYPES
➕ Добавлено: ~$COUNT школ на тип
🔗 https://pro-schools.ru/shkoly/$SLUG/

📅 $(date +'%d.%m.%Y %H:%M') МСК"
          else
            MSG="❌ *Ошибка добавления карточек*
Проверь: https://github.com/konovaloff090495-lab/school-portal/actions"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d "text=$MSG" > /dev/null
