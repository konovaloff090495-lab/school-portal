name: Add New City

on:
  schedule:
    # Пн, Ср, Пт в 10:00 МСК (07:00 UTC) — добавляем 1 новый город из очереди
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch:
    inputs:
      city_slug:
        description: 'Конкретный город (slug). Пусто = следующий из очереди'
        required: false
      count:
        description: 'Школ на тип'
        default: '8'
        required: false

jobs:
  add-city:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show queue status
        run: node scripts/pipeline.mjs --status

      - name: Run city pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_PROJECT_ID: prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ
          VERCEL_ORG_ID: team_nn4HHJh7sr6tITE0mA24TmBT
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          CITY_SLUG="${{ github.event.inputs.city_slug }}"
          COUNT="${{ github.event.inputs.count || '8' }}"

          # Передаём count через env для pipeline
          export CITY_COUNT=$COUNT

          if [ -n "$CITY_SLUG" ]; then
            node scripts/pipeline.mjs --city-only=$CITY_SLUG --no-deploy
          else
            # Берём только 1 следующий город из очереди
            node -e "
              const { execSync } = require('child_process');
              const fs = require('fs');
              const queue = JSON.parse(fs.readFileSync('scripts/city-queue.json', 'utf-8'));
              const next = queue.find(c => c.status === 'pending');
              if (!next) { console.log('✅ Все города готовы!'); process.exit(0); }
              console.log('Обрабатываем:', next.city, '(' + next.slug + ')');
              execSync('node scripts/pipeline.mjs --city-only=' + next.slug + ' --no-deploy', { stdio: 'inherit' });
            "
          fi

      - name: Configure git
        run: |
          git config user.name "pro-schools bot"
          git config user.email "bot@pro-schools.ru"

      - name: Commit and push
        run: |
          git add src/data/schools.ts scripts/city-queue.json
          git diff --staged --quiet || git commit -m "Cities: add next city from queue $(date +'%Y-%m-%d')"
          git pull --no-rebase -X ours origin main
          git push

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          COMMIT=$(git rev-parse HEAD)
          curl -sf -X POST "https://api.vercel.com/v13/deployments?teamId=team_nn4HHJh7sr6tITE0mA24TmBT" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"school-portal\",
              \"project\": \"prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"konovaloff090495-lab\",
                \"repo\": \"school-portal\",
                \"ref\": \"main\",
                \"sha\": \"$COMMIT\"
              }
            }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('url'), '— state:', d.get('readyState'))"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          CITY=$(node -e "
            const fs = require('fs');
            const q = JSON.parse(fs.readFileSync('scripts/city-queue.json', 'utf-8'));
            const done = q.filter(c => c.status === 'done');
            const last = done[done.length - 1];
            console.log(last ? last.city : 'Новый город');
          " 2>/dev/null || echo "Новый город")

          SCHOOL_COUNT=$(node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/data/schools.ts', 'utf-8');
            const matches = content.match(/type: '[^']+' as const/g);
            console.log(matches ? matches.length : 0);
          " 2>/dev/null || echo "?")

          PENDING=$(node -e "
            const fs = require('fs');
            const q = JSON.parse(fs.readFileSync('scripts/city-queue.json', 'utf-8'));
            console.log(q.filter(c => c.status === 'pending').length);
          " 2>/dev/null || echo "?")

          if [ "$JOB_STATUS" = "success" ]; then
            MSG=$(printf '🏙 *Новый город на pro-schools.ru*\n\n📍 Добавлен: %s\n🏫 Всего школ в базе: %s\n📋 Городов в очереди: %s\n🔗 https://pro-schools.ru/shkoly/\n\n📅 %s МСК' \
              "$CITY" "$SCHOOL_COUNT" "$PENDING" "$(date +'%d.%m.%Y %H:%M')")
          else
            MSG=$(printf '❌ *Ошибка добавления города*\nПроверь: https://github.com/konovaloff090495-lab/school-portal/actions')
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d "text=${MSG}" > /dev/null
