name: Deploy to Beget

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Deploy to Beget via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.80.70.209
          username: root
          key: ${{ secrets.BEGET_SSH_KEY }}
          command_timeout: 55m
          script: |
            cd /var/www/school-portal
            echo "==> git pull..."
            GIT_SSH_COMMAND='ssh -i /root/.ssh/github_school_portal -o StrictHostKeyChecking=no' git pull origin main
            echo "==> npm ci..."
            npm ci --prefer-offline
            echo "==> build..."
            npm run build
            echo "==> restart PM2..."
            pm2 restart school-portal || pm2 start npm --name school-portal -- start
            pm2 save
            echo "==> done"
