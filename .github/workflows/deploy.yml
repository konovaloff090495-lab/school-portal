name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Vercel deployment via API
        run: |
          COMMIT=$(git ls-remote https://github.com/konovaloff090495-lab/school-portal.git HEAD | cut -f1)
          echo "Triggering deployment for commit: $COMMIT"
          curl -sf -X POST "https://api.vercel.com/v13/deployments?teamId=team_nn4HHJh7sr6tITE0mA24TmBT" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"school-portal\",
              \"project\": \"prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"konovaloff090495-lab\",
                \"repo\": \"school-portal\",
                \"ref\": \"main\",
                \"sha\": \"$COMMIT\"
              }
            }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployment:', d.get('url'), '— state:', d.get('readyState'))"
