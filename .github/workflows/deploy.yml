name: Deploy to Beget

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Deploy to Beget via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.80.70.209
          username: root
          key: ${{ secrets.BEGET_SSH_KEY }}
          command_timeout: 55m
          script: |
            cd /var/www/school-portal
            echo "==> git pull..."
            GIT_SSH_COMMAND='ssh -i /root/.ssh/github_school_portal -o StrictHostKeyChecking=no' git pull origin main
            echo "==> npm ci..."
            npm ci --prefer-offline
            echo "==> stop PM2 (освобождаем .next перед очисткой)..."
            pm2 delete school-portal 2>/dev/null || true
            sleep 2
            echo "==> clean .next cache..."
            rm -rf .next || true
            echo "==> build..."
            if npm run build; then
              echo "==> build OK, start PM2..."
              PORT=3001 pm2 start npm --name school-portal -- start
              pm2 save
              echo "==> done"
            else
              echo "!! BUILD FAILED — пробуем стартовать на текущем .next"
              PORT=3001 pm2 start npm --name school-portal -- start
              pm2 save
              exit 1
            fi
