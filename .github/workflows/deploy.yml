name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          COMMIT=$(git rev-parse HEAD)
          echo "Deploying commit: $COMMIT"
          curl -sf -X POST "https://api.vercel.com/v13/deployments?teamId=team_nn4HHJh7sr6tITE0mA24TmBT" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"school-portal\",
              \"project\": \"prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"konovaloff090495-lab\",
                \"repo\": \"school-portal\",
                \"ref\": \"main\",
                \"sha\": \"$COMMIT\"
              }
            }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployment:', d.get('url'), '— state:', d.get('readyState'))"
