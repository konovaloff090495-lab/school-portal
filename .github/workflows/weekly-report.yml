name: Weekly Balance Report

on:
  schedule:
    # Каждый понедельник в 08:00 МСК (05:00 UTC)
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: 'За сколько дней отчёт'
        default: '7'
        required: false

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate weekly report and notify Telegram
        env:
          YANDEX_METRICA_TOKEN: ${{ secrets.YANDEX_METRICA_TOKEN }}
        run: |
          # Читаем лог расходов
          REPORT=$(node scripts/cost-tracker.mjs report --days=7 2>/dev/null || echo "Нет данных за неделю")

          # Статистика по блогу
          BLOG_COUNT=$(git log --since="7 days ago" --oneline --grep="Blog: auto-generate" | wc -l | tr -d ' ')
          CITY_COUNT=$(git log --since="7 days ago" --oneline --grep="Cities:" | wc -l | tr -d ' ')
          SCHOOL_COUNT=$(git log --since="7 days ago" --oneline --grep="Schools:" | wc -l | tr -d ' ')

          # Считаем статьи (5 в день × дни)
          ARTICLES=$((BLOG_COUNT * 5))

          # Трафик Яндекс.Метрика
          TRAFFIC_LINE=""
          if [ -n "$YANDEX_METRICA_TOKEN" ]; then
            COUNTER_ID="108789843"
            YESTERDAY=$(date -d 'yesterday' +'%Y-%m-%d')
            DAY_BEFORE=$(date -d '2 days ago' +'%Y-%m-%d')

            # Запрос за вчера
            VISITS_YESTERDAY=$(curl -s \
              "https://api-metrika.yandex.net/stat/v1/data?ids=$COUNTER_ID&metrics=ym:s:visits&date1=$YESTERDAY&date2=$YESTERDAY" \
              -H "Authorization: OAuth $YANDEX_METRICA_TOKEN" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d['totals'][0]))" 2>/dev/null || echo "0")

            # Запрос за позавчера
            VISITS_BEFORE=$(curl -s \
              "https://api-metrika.yandex.net/stat/v1/data?ids=$COUNTER_ID&metrics=ym:s:visits&date1=$DAY_BEFORE&date2=$DAY_BEFORE" \
              -H "Authorization: OAuth $YANDEX_METRICA_TOKEN" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d['totals'][0]))" 2>/dev/null || echo "0")

            # Считаем дельту
            if [ "$VISITS_BEFORE" -gt 0 ] 2>/dev/null; then
              DELTA=$((VISITS_YESTERDAY - VISITS_BEFORE))
              if [ "$DELTA" -gt 0 ]; then
                DELTA_STR="+$DELTA ▲"
              elif [ "$DELTA" -lt 0 ]; then
                DELTA_STR="$DELTA ▼"
              else
                DELTA_STR="0 →"
              fi
              TRAFFIC_LINE="📈 Трафик вчера: *${VISITS_YESTERDAY}* визитов (${DELTA_STR} к позавчера)"
            else
              TRAFFIC_LINE="📈 Трафик вчера: *${VISITS_YESTERDAY}* визитов"
            fi
          fi

          MSG="📊 *Еженедельный отчёт pro-schools.ru*

🗓 Неделя: $(date -d '7 days ago' +'%d.%m') — $(date +'%d.%m.%Y')

*Что было сделано:*
📝 Статей написано: ~$ARTICLES
🏙 Городов добавлено: $CITY_COUNT
🏫 Пачек карточек: $SCHOOL_COUNT
${TRAFFIC_LINE}

*Расходы Claude API:*
$REPORT

⚠️ *Не забудь проверить баланс\!*
👉 [Пополнить баланс](https://console.anthropic.com/settings/billing)"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=$MSG" > /dev/null

          echo "Отчёт отправлен"
