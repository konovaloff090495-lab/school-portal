name: Daily Blog Generation

on:
  schedule:
    # Каждый день в 09:00 МСК (06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество статей'
        default: '5'
        required: false

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Replenish topics if queue is low
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-topics.mjs

      - name: Generate blog articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '5' }}
          node scripts/generate-blog.mjs --count=$COUNT --no-deploy

      - name: Build
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "pro-schools bot"
          git config user.email "bot@pro-schools.ru"

      - name: Commit and push
        run: |
          git add src/data/blog.ts scripts/blog-topics.json
          git diff --staged --quiet || git commit -m "Blog: auto-generate 5 articles $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_PROJECT_ID: prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ
          VERCEL_ORG_ID: team_nn4HHJh7sr6tITE0mA24TmBT
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --yes --token $VERCEL_TOKEN

      - name: Notify Telegram
        if: always()
        env:
          YANDEX_METRICA_TOKEN: ${{ secrets.YANDEX_METRICA_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ARTICLE_COUNT: ${{ github.event.inputs.count || '5' }}
          JOB_STATUS: ${{ job.status }}
        run: |
          # Извлекаем заголовки и slugи последних N статей из blog.ts
          ARTICLES=$(node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/data/blog.ts', 'utf-8');
            const titleMatches = [...content.matchAll(/title:\s*['\"]([^'\"]+)['\"]/g)].map(m => m[1]);
            const slugMatches  = [...content.matchAll(/slug:\s*['\"]([^'\"]+)['\"]/g)].map(m => m[1]);
            const count = parseInt(process.env.ARTICLE_COUNT || '5');
            const last = titleMatches.slice(-count);
            const lastSlugs = slugMatches.slice(-count);
            const lines = last.map((t, i) => '• ' + t + '\n  https://pro-schools.ru/blog/' + lastSlugs[i] + '/');
            console.log(lines.join('\n'));
          " 2>/dev/null || echo "• Статьи сгенерированы")

          # Трафик Яндекс.Метрика
          TRAFFIC_LINE=""
          if [ -n "$YANDEX_METRICA_TOKEN" ]; then
            COUNTER_ID="108789843"
            YESTERDAY=$(date -d 'yesterday' +'%Y-%m-%d')
            DAY_BEFORE=$(date -d '2 days ago' +'%Y-%m-%d')

            VISITS_YESTERDAY=$(curl -s \
              "https://api-metrika.yandex.net/stat/v1/data?ids=$COUNTER_ID&metrics=ym:s:visits&date1=$YESTERDAY&date2=$YESTERDAY" \
              -H "Authorization: OAuth $YANDEX_METRICA_TOKEN" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d['totals'][0]))" 2>/dev/null || echo "0")

            VISITS_BEFORE=$(curl -s \
              "https://api-metrika.yandex.net/stat/v1/data?ids=$COUNTER_ID&metrics=ym:s:visits&date1=$DAY_BEFORE&date2=$DAY_BEFORE" \
              -H "Authorization: OAuth $YANDEX_METRICA_TOKEN" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d['totals'][0]))" 2>/dev/null || echo "0")

            if [ "$VISITS_BEFORE" -gt 0 ] 2>/dev/null; then
              DELTA=$((VISITS_YESTERDAY - VISITS_BEFORE))
              if [ "$DELTA" -gt 0 ]; then DELTA_STR="+$DELTA ▲"
              elif [ "$DELTA" -lt 0 ]; then DELTA_STR="$DELTA ▼"
              else DELTA_STR="0 →"; fi
              TRAFFIC_LINE=$(printf '\n📈 Трафик вчера: %s визитов (%s к позавчера)' "$VISITS_YESTERDAY" "$DELTA_STR")
            else
              TRAFFIC_LINE=$(printf '\n📈 Трафик вчера: %s визитов' "$VISITS_YESTERDAY")
            fi
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            MSG=$(printf '✅ *Новые статьи на pro-schools.ru*\n\n%s%s\n\n📅 %s МСК' \
              "$ARTICLES" "$TRAFFIC_LINE" "$(date +'%d.%m.%Y %H:%M')")
          else
            MSG=$(printf '❌ *Ошибка генерации статей*\nПроверь: https://github.com/konovaloff090495-lab/school-portal/actions')
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d "text=${MSG}" > /dev/null
