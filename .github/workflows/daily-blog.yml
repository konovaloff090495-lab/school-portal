name: Daily Blog Generation

on:
  schedule:
    # Каждый день в 09:00 МСК (06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество статей'
        default: '5'
        required: false

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Replenish topics if queue is low
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-topics.mjs

      - name: Generate blog articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '5' }}
          node scripts/generate-blog.mjs --count=$COUNT --no-deploy

      - name: Build
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "pro-schools bot"
          git config user.email "bot@pro-schools.ru"

      - name: Commit and push
        run: |
          git add src/data/blog.ts scripts/blog-topics.json
          git diff --staged --quiet || git commit -m "Blog: auto-generate 5 articles $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_PROJECT_ID: prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ
          VERCEL_ORG_ID: team_nn4HHJh7sr6tITE0mA24TmBT
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --yes --token $VERCEL_TOKEN

      - name: Notify Telegram
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Читаем slugи новых статей из git diff
          SLUGS=$(git log -1 --name-only --diff-filter=M -- src/data/blog.ts 2>/dev/null | head -1)

          # Извлекаем заголовки и slugи последних 5 статей из blog.ts
          ARTICLES=$(node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/data/blog.ts', 'utf-8');
            const titleMatches = [...content.matchAll(/title:\s*['\"]([^'\"]+)['\"]/g)].map(m => m[1]);
            const slugMatches  = [...content.matchAll(/slug:\s*['\"]([^'\"]+)['\"]/g)].map(m => m[1]);
            const count = ${{ github.event.inputs.count || '5' }};
            const last = titleMatches.slice(-count);
            const lastSlugs = slugMatches.slice(-count);
            const lines = last.map((t, i) => '• ' + t + '\n  https://pro-schools.ru/blog/' + lastSlugs[i] + '/');
            console.log(lines.join('\n'));
          " 2>/dev/null || echo "• Статьи сгенерированы")

          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            MSG="$ICON *Новые статьи на pro-schools.ru*

$ARTICLES

📅 $(date +'%d.%m.%Y %H:%M') МСК"
          else
            ICON="❌"
            MSG="$ICON *Ошибка генерации статей*
Проверь: https://github.com/konovaloff090495-lab/school-portal/actions"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d "text=$MSG" > /dev/null
