name: Daily Blog Generation

on:
  schedule:
    # Каждый день в 08:00 МСК (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество статей'
        default: '2'
        required: false

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_PROJECT_ID: prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ
          VERCEL_ORG_ID: team_nn4HHJh7sr6tITE0mA24TmBT
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          COUNT=${{ github.event.inputs.count || '2' }}
          node scripts/generate-blog.mjs --count=$COUNT --no-deploy

      - name: Build
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "pro-schools bot"
          git config user.email "bot@pro-schools.ru"

      - name: Commit changes
        run: |
          git add src/data/blog.ts scripts/blog-topics.json
          git diff --staged --quiet || git commit -m "Blog: auto-generate articles $(date +'%Y-%m-%d')"

      - name: Push changes
        run: git push

      - name: Deploy to Vercel
        env:
          VERCEL_PROJECT_ID: prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ
          VERCEL_ORG_ID: team_nn4HHJh7sr6tITE0mA24TmBT
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --yes --token $VERCEL_TOKEN
