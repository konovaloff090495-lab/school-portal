name: Restart Site
on:
  workflow_dispatch:
jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Restart PM2 with memory guard
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.80.70.209
          username: root
          key: ${{ secrets.BEGET_SSH_KEY }}
          script: |
            cd /var/www/school-portal
            pm2 delete school-portal 2>/dev/null || true
            PORT=3001 NODE_OPTIONS="--max-old-space-size=1024" pm2 start npm --name school-portal --max-memory-restart 900M --time -- start
            pm2 save
            pm2 status
