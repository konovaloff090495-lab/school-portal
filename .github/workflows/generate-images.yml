name: Generate Blog Images

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Сколько картинок сгенерировать (0 = все без картинок)'
        default: '50'
        required: false

jobs:
  generate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate images
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          node scripts/generate-blog-images.mjs --limit=$LIMIT

      - name: Configure git
        run: |
          git config user.name "pro-schools bot"
          git config user.email "bot@pro-schools.ru"

      - name: Commit and push
        run: |
          git add src/data/blog.ts public/blog/images/
          git diff --staged --quiet || git commit -m "Images: generate blog previews $(date +'%Y-%m-%d')"
          git pull --no-rebase -X ours origin main
          git push

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          COMMIT=$(git rev-parse HEAD)
          curl -sf -X POST "https://api.vercel.com/v13/deployments?teamId=team_nn4HHJh7sr6tITE0mA24TmBT" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"school-portal\",\"project\":\"prj_VYu8oMFiOeRe6Pabqug4NJaekgpJ\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"org\":\"konovaloff090495-lab\",\"repo\":\"school-portal\",\"ref\":\"main\",\"sha\":\"$COMMIT\"}}" \
            > /dev/null && echo "✅ Deploy triggered"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          DATE=$(date +'%d.%m.%Y %H:%M')
          TOTAL=$(ls public/blog/images/*.jpg 2>/dev/null | wc -l | tr -d ' ')
          if [ "$JOB_STATUS" = "success" ]; then
            MSG=$(printf '🖼 *Картинки для блога сгенерированы*\n\n📸 Всего картинок: %s\n🔗 https://pro-schools.ru/blog/\n%s МСК' "$TOTAL" "$DATE")
          else
            MSG=$(printf '❌ *Ошибка генерации картинок*\nПроверь: https://github.com/konovaloff090495-lab/school-portal/actions')
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d "text=${MSG}" > /dev/null
